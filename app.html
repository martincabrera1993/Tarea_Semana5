<div class="contedor">
  <mat-card-content>
      <mat-card class="calculadora">
    <mat-card-title style="text-align: center; color: rgb(255, 0, 0);font-size: 5ch;">CALCULADORA</mat-card-title>
  </mat-card>
  <div class="pantalla">
    {{pantalla}}
  </div>
  <div class="botones">
  <button mat-raised-button color="warm" (click)="limpiar()">C</button>
  <button mat-raised-button color="warm" (click)="limpiar()">CE</button>
  <button mat-raised-button color="warm" (click)="agregarPorcentaje()">%</button>
  <button mat-raised-button color="warm" (click)="borrar_ultimo()">(X)</button>

  <button mat-raised-button color="warm" (click)="agregarNumero('7')">7</button>
  <button mat-raised-button color="warm" (click)="agregarNumero('8')">8</button>
  <button mat-raised-button color="warm" (click)="agregarNumero('9')">9</button>
  <button mat-raided-button color="warm" (click)="presionarOperacion('/')">/</button>

  <button mat-raised-button color="warm" (click)="agregarNumero('4')">4</button>
  <button mat-raised-button color="warm" (click)="agregarNumero('5')">5</button>
  <button mat-raised-button color="warm" (click)="agregarNumero('6')">6</button>
  <button mat-raided-button color="warm" (click)="presionarOperacion('*')">*</button>

  <button mat-raised-button color="warm" (click)="agregarNumero('1')">1</button>
  <button mat-raised-button color="warm" (click)="agregarNumero('2')">2</button>
  <button mat-raised-button color="warm" (click)="agregarNumero('3')">3</button>
  <button mat-raided-button color="warm" (click)="presionarOperacion('-')">-</button>

  <button mat-raised-button color="warm" (click)="agregarNumero('0')">0</button>
  <button mat-raised-button color="warm" (click)="agregarDecimal()">.</button>
  <button mat-raised-button color="warm" (click)="obtenerResultado()">=</button>
  <button mat-raided-button color="warm" (click)="presionarOperacion('+')">+</button>
</div>|
  </mat-card-content>
</div>|
|
